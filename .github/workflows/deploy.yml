name: Deploy

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - closed

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      issues: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build
        env:
          NODE_ENV: production

      - name: Build OpenNext
        run: npx opennextjs-cloudflare build

      - name: Install Wrangler
        run: npm install -g wrangler

      # Deploy to main domain (main branch only)
      - name: Deploy to Cloudflare (Main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Deploy to preview environment (PR only)
      - name: Deploy to Cloudflare (Preview)
        if: github.event_name == 'pull_request'
        id: deploy-preview
        run: |
          PR_NUM=${{ github.event.pull_request.number }}

          # Deploy to environment named pr-{PR_NUMBER}
          # Using --legacy-env to ensure environment-based deployments work
          DEPLOY_OUTPUT=$(NO_COLOR=1 wrangler deploy --env "pr-${PR_NUM}" --legacy-env 2>&1)
          echo "$DEPLOY_OUTPUT"

          # Prefer the exact workers.dev URL returned by Wrangler.
          PREVIEW_URL=$(printf '%s\n' "$DEPLOY_OUTPUT" | grep -Eo 'https://[^[:space:]]+\.workers\.dev' | head -n 1 || true)

          if [ -z "$PREVIEW_URL" ]; then
            echo "Failed to parse preview URL from Wrangler output." >&2
            exit 1
          fi

          echo "Preview URL: $PREVIEW_URL"
          echo "preview_url=${PREVIEW_URL}" >> "$GITHUB_OUTPUT"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Comment preview link on PR
      - name: Deploy status comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const previewUrl = process.env.PREVIEW_URL;
            const prNumber = context.payload.pull_request.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Check for existing comment to avoid duplicates
            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number: prNumber
            });

            const existingComment = comments.find(comment => 
              comment.body.includes('🚀 Preview deployed:')
            );

            const commentBody = `🚀 Preview deployed: ${previewUrl}`;

            if (existingComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existingComment.id,
                body: commentBody
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: prNumber,
                body: commentBody
              });
            }
        env:
          PREVIEW_URL: ${{ steps.deploy-preview.outputs.preview_url }}

  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      issues: write
      pull-requests: write

    # Only run when PR is closed
    if: github.event_name == 'pull_request' && github.event.action == 'closed'

    steps:
      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Cleanup preview environment
        run: |
          PR_NUM=${{ github.event.pull_request.number }}
          ACCOUNT_ID=${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          WORKER_NAME="echobell-one"
          
          echo "Cleaning up preview environment for PR #${PR_NUM}"
          
          # Option 1: Try to delete the environment via Cloudflare API
          # This requires the environment to be delete-enabled
          RESPONSE=$(curl -s -X DELETE \
            "https://api.cloudflare.com/client/v4/accounts/${ACCOUNT_ID}/workers/scripts/${WORKER_NAME}/environments/pr-${PR_NUM}" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json")
          
          echo "API Cleanup response: $RESPONSE"
          
          # Option 2: Deploy an empty/dummy config to effectively disable the preview
          # Create a minimal wrangler config for cleanup
          echo '{"name":"'${WORKER_NAME}'","main":"","env":{"pr-'${PR_NUM}'":{"routes":[]}}}' > /tmp/cleanup.json
          
          # Try wrangler deploy with delete flag
          wrangler deploy --env pr-${PR_NUM} --legacy-env 2>&1 || echo "Wrangler cleanup attempted"
          
          echo "Cleanup completed for PR #${PR_NUM}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Add cleanup comment
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: prNumber,
              body: `🧹 Preview environment cleaned up (PR #${prNumber} closed/merged)`
            });
